<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzień Kobiet - Wirtualna Kartka</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Background Particles -->
    <canvas id="particles-bg"></canvas>

    <!-- Initial Loader -->
    <div id="loader">
        <div class="loader-content">
            <h1 class="loader-title">Dla Ciebie...</h1>
            <div class="loader-line"></div>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content">
        <div class="scene">
            <div class="book" id="greeting-book">
                <!-- Pages will be dynamically injected via script.js -->
            </div>
        </div>
    </main>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
